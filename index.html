<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>1С:Управление Предприятием (Демо Спортпит)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root {
    --bg-color: #f1f5f9;
    --sidebar-bg: #1e293b;
    --primary: #2563eb;
    --text-main: #334155;
    --border: #e2e8f0;
    --white: #ffffff;
}
body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    height: 100vh;
    background: var(--bg-color);
    color: var(--text-main);
}
.sidebar {
    width: 250px;
    background: var(--sidebar-bg);
    color: white;
    display: flex;
    flex-direction: column;
}
.logo {
    padding: 20px;
    font-size: 1.1rem;
    font-weight: 700;
    border-bottom: 1px solid #334155;
    letter-spacing: 0.5px;
    color: #e2e8f0;
}
.menu {
    list-style: none;
    padding: 0;
    margin: 0;
}
.menu li {
    padding: 15px 20px;
    cursor: pointer;
    font-size: 0.95rem;
    color: #94a3b8;
    transition: all 0.2s;
}
.menu li:hover { color: white; }
.menu li.active {
    background: var(--primary);
    color: white;
    font-weight: 500;
}
.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
}
.header {
    background: var(--white);
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
    z-index: 10;
}
.header h2 {
    margin: 0;
    font-size: 1.25rem;
    color: #0f172a;
    font-weight: 600;
}
.content {
    padding: 30px;
    display: flex;
    gap: 30px;
    flex: 1;
    overflow-y: auto;
}
.orders-table {
    width: 60%;
    background: var(--white);
    border-collapse: collapse;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    align-self: flex-start;
}
.orders-table th, .orders-table td {
    padding: 14px 20px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
}
.orders-table th {
    background: #f8fafc;
    font-weight: 600;
    color: #64748b;
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 0.5px;
}
.orders-table tbody tr {
    cursor: pointer;
    transition: all 0.2s;
}
.orders-table tbody tr:hover { background: #f8fafc; }
.orders-table tbody tr.highlighted {
    background: #eff6ff;
    border-left: 4px solid var(--primary);
}
.internal-id {
    color: #94a3b8;
    font-family: monospace;
}
.strong {
    font-weight: 600;
    color: #0f172a;
}
@keyframes glow {
    0% { background-color: transparent; }
    30% { background-color: #fef08a; transform: scale(1.02); }
    80% { background-color: #fef08a; transform: scale(1.02); }
    100% { background-color: #eff6ff; transform: scale(1); }
}
.glow-animation { animation: glow 1.2s ease-in-out; }
.badge {
    padding: 4px 10px;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 600;
}
.bg-green { background: #dcfce7; color: #16a34a; }
.bg-gray { background: #f1f5f9; color: #475569; }
.bg-yellow { background: #fef9c3; color: #a16207; }
.bg-blue { background: #dbeafe; color: #2563eb; }
.order-card {
    width: 40%;
    background: var(--white);
    border-radius: 8px;
    box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-self: flex-start;
    animation: slideIn 0.3s ease-out;
}
@keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
}
.order-card.hidden { display: none; }
.order-card h3 {
    margin-top: 0;
    border-bottom: 1px solid var(--border);
    padding-bottom: 15px;
    font-size: 1.1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.order-id-badge {
    background: #f1f5f9;
    padding: 4px 8px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 0.9rem;
    color: #475569;
}
.card-tabs {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
}
.card-tabs button {
    padding: 10px 5px;
    border: none;
    background: transparent;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    color: #64748b;
    font-weight: 500;
    font-size: 0.9rem;
    margin-bottom: -1px;
}
.card-tabs button.active {
    border-bottom-color: var(--primary);
    color: var(--primary);
}
.card-details { flex: 1; }
.card-details p {
    margin: 12px 0;
    font-size: 0.95rem;
    display: flex;
    justify-content: space-between;
}
.card-details p strong {
    color: #64748b;
    font-weight: 500;
}
.tracks-box {
    margin-top: 25px;
    padding: 15px;
    background: #f8fafc;
    border-radius: 6px;
    border: 1px dashed #cbd5e1;
}
.tracks-box strong {
    color: #475569;
    font-size: 0.85rem;
    text-transform: uppercase;
}
.tracks-box ul {
    margin: 10px 0 0 20px;
    padding: 0;
}
.tracks-box li {
    font-family: monospace;
    font-size: 1.1rem;
    color: var(--text-main);
    font-weight: bold;
    margin-bottom: 4px;
}
.btn-close {
    margin-top: 30px;
    padding: 12px;
    background: #f1f5f9;
    color: #475569;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s;
}
.btn-close:hover { background: #e2e8f0; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">1C: Enterprise (Demo)</div>
        <ul class="menu">
            <li class="active">Журнал Заказов</li>
            <li>Склад</li>
            <li>Отчеты</li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="header">
            <h2>Журнал заказов покупателей</h2>
            <div class="user-info">Администратор</div>
        </div>
        
        <div class="content">
            <table class="orders-table">
                <thead>
                    <tr>
                        <th>Внутр. Номер</th>
                        <th>Номер сайта</th>
                        <th>Статус</th>
                        <th>Клиент</th>
                        <th>Сумма</th>
                        <th>Доставка</th>
                    </tr>
                </thead>
                <tbody id="orders-body"></tbody>
            </table>
            
            <div id="order-card" class="order-card hidden">
                <h3>Карточка заказа <span class="order-id-badge" id="card-id"></span></h3>
                <div class="card-tabs">
                    <button class="active">Основное</button>
                    <button>Оплата</button>
                    <button>Доставка и Треки</button>
                </div>
                <div class="card-details">
                    <p><strong>Клиент:</strong> <span id="card-client"></span></p>
                    <p><strong>Телефон:</strong> <span id="card-phone"></span></p>
                    <p><strong>Сумма:</strong> <span id="card-sum"></span> руб.</p>
                    <p><strong>Служба доставки:</strong> <span id="card-delivery"></span> <span id="card-pvz" style="color:#64748b; font-size: 0.9em"></span></p>
                    <div class="tracks-box">
                        <strong>Присвоенные трек-номера:</strong>
                        <ul id="card-tracks"></ul>
                    </div>
                </div>
                <button onclick="closeCard()" class="btn-close">Закрыть карточку</button>
            </div>
        </div>
    </div>

    <script>
        const ordersData = {
            "671644": {
                "id": "00ЦБ-104039",
                "status": "Оплачен",
                "client": "Петров Алексей Игоревич",
                "phone": "89171234567",
                "sum": "1 899.00",
                "delivery": "Яндекс",
                "pvz": "Москва",
                "tracks": ["10244068400"]
            },
            "671647": {
                "id": "00ЦБ-104042",
                "status": "Оплачен",
                "client": "Смирнова Ольга",
                "phone": "89819001122",
                "sum": "391.88",
                "delivery": "Яндекс",
                "pvz": "Москва",
                "tracks": ["10244068401"]
            },
            "671649": {
                "id": "00ЦБ-104045",
                "status": "Оплачен",
                "client": "Новикова Татьяна Ивановна",
                "phone": "89170003344",
                "sum": "1 899.00",
                "delivery": "Почта России",
                "pvz": "Москва",
                "tracks": ["10244068402"]
            },
            "671650": {
                "id": "00ЦБ-104046",
                "status": "Оплачен",
                "client": "Кузнецова Екатерина",
                "phone": "89174005566",
                "sum": "1 551.03",
                "delivery": "Яндекс",
                "pvz": "Москва",
                "tracks": ["10244068403"]
            },
            "671654": {
                "id": "00ЦБ-104052",
                "status": "Оплачен",
                "client": "Волкова Татьяна",
                "phone": "89141007788",
                "sum": "1 799.00",
                "delivery": "СДЭК",
                "pvz": "Москва",
                "tracks": ["10244068404"]
            },
            "671661": {
                "id": "00ЦБ-104058",
                "status": "Оплачен",
                "client": "Лебедева Яна Николаевна",
                "phone": "89160009900",
                "sum": "3 499.00",
                "delivery": "СДЭК",
                "pvz": "Москва",
                "tracks": ["10244068405"]
            },
            "670800": {
                "id": "00ЦБ-102508",
                "status": "Закрыт",
                "client": "Соколова Анна",
                "phone": "89219001122",
                "sum": "15 651.08",
                "delivery": "СДЭК",
                "pvz": "SPB338, Санкт-Петербург",
                "tracks": ["10244068495", "10244033927"]
            },
            "671670": {
                "id": "00ЦБ-104070",
                "status": "Новый",
                "client": "Морозов Дмитрий Сергеевич",
                "phone": "89261234567",
                "sum": "4 200.00",
                "delivery": "—",
                "pvz": "Москва",
                "tracks": []
            },
            "671680": {
                "id": "00ЦБ-104080",
                "status": "Частично отгружен",
                "client": "Козлова Мария Петровна",
                "phone": "89037654321",
                "sum": "8 750.00",
                "delivery": "СДЭК + Яндекс",
                "pvz": "Екатеринбург",
                "tracks": ["10244068510", "7293846501"]
            }
        };

        function getStatusClass(status) {
            if (status === 'Оплачен') return 'bg-green';
            if (status === 'Новый') return 'bg-yellow';
            if (status === 'Частично отгружен') return 'bg-blue';
            return 'bg-gray';
        }

        function renderTable() {
            const tbody = document.getElementById('orders-body');
            tbody.innerHTML = '';
            for (const [clientId, order] of Object.entries(ordersData)) {
                const tr = document.createElement('tr');
                tr.id = `row-${clientId}`;
                tr.onclick = () => openCard(clientId);
                tr.innerHTML = `
                    <td class="internal-id">${order.id}</td>
                    <td class="strong">${clientId}</td>
                    <td><span class="badge ${getStatusClass(order.status)}">${order.status}</span></td>
                    <td>${order.client}</td>
                    <td>${order.sum}</td>
                    <td>${order.delivery}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        function openCard(clientId) {
            const order = ordersData[clientId];
            if (!order) return;
            document.querySelectorAll('tr').forEach(row => row.classList.remove('highlighted', 'glow-animation'));
            const activeRow = document.getElementById(`row-${clientId}`);
            if(activeRow) activeRow.classList.add('highlighted');
            document.getElementById('card-id').textContent = order.id;
            document.getElementById('card-client').textContent = order.client;
            document.getElementById('card-phone').textContent = order.phone;
            document.getElementById('card-sum').textContent = order.sum;
            document.getElementById('card-delivery').textContent = order.delivery;
            document.getElementById('card-pvz').textContent = order.pvz ? `(${order.pvz})` : '';
            const tracksList = document.getElementById('card-tracks');
            tracksList.innerHTML = '';
            if (order.tracks.length === 0) {
                const li = document.createElement('li');
                li.textContent = 'Ещё не присвоен';
                li.style.color = '#a16207';
                tracksList.appendChild(li);
            } else {
                order.tracks.forEach(trackString => {
                    const li = document.createElement('li');
                    li.textContent = trackString;
                    if(order.tracks.length > 1) li.style.color = '#dc2626';
                    tracksList.appendChild(li);
                });
            }
            document.getElementById('order-card').classList.remove('hidden');
        }

        function closeCard() {
            document.getElementById('order-card').classList.add('hidden');
            document.querySelectorAll('tr').forEach(row => row.classList.remove('highlighted'));
        }

        renderTable();
    </script>
</body>
</html>
